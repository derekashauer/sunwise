name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      REMOTE_PATH: ~/www/dereka328.sg-host.com/public_html
      SSH_OPTS: -o ControlMaster=auto -o ControlPath=/tmp/ssh-%r@%h:%p -o ControlPersist=10m
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts and open SSH master connection
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          ssh $SSH_OPTS -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd $REMOTE_PATH && rm -rf assets sw.js workbox-*.js registerSW.js manifest.webmanifest && echo 'Master connection up; stale assets cleaned'"

      - name: Deploy frontend
        run: |
          rsync -avz \
            -e "ssh $SSH_OPTS -p ${{ secrets.SSH_PORT }}" \
            frontend/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_PATH/"

      - name: Deploy API
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS -p ${{ secrets.SSH_PORT }}" \
            api/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_PATH/api/"

      - name: Deploy .htaccess
        run: |
          rsync -avz \
            -e "ssh $SSH_OPTS -p ${{ secrets.SSH_PORT }}" \
            .htaccess \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_PATH/.htaccess"

      - name: Clear caches, run migrations, verify
        run: |
          ssh $SSH_OPTS -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd $REMOTE_PATH && \
              rm -f data/cache/*.json data/cache/*.tmp 2>/dev/null || true; \
              find . -name '*.cache' -delete 2>/dev/null || true; \
              echo 'Caches cleared'; \
              php -r 'require \"api/config/config.php\"; require \"api/config/database.php\"; Database::runMigrations(); echo \"Migrations complete\n\";'; \
              echo \"Frontend asset files: \$(ls assets/*.js 2>/dev/null | wc -l)\""

      - name: Close SSH master connection
        if: always()
        run: |
          ssh $SSH_OPTS -O exit -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 2>/dev/null || true
